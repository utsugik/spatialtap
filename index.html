<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spatial Tap — Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* Spatial Tap 専用のデザイン言語（HANDOFF 10章）: 他プロジェクトの計測器的な配色・フォントとは
     意図的に切り離している。2026-07-10、社内モックアップ「Lavender / Nunito」に合わせて全面刷新
     （HANDOFF 2章の設計思想「夜に浮かぶ親しみやすい体験」に基づく。以前のZen Maru Gothic/黒背景版から変更）。 */
  :root{
    --bg-grad:linear-gradient(180deg,#574f74 0%,#433a5e 55%,#322c47 100%);
    --bg:#433a5e;--surface:transparent;--panel:transparent;
    --line:rgba(255,255,255,.09);--line2:rgba(255,255,255,.14);
    --text:#f3eef8;--muted:rgba(243,238,248,.55);--muted2:rgba(243,238,248,.35);
    --L:#9fe3cf;--L-glow:rgba(159,227,207,.5);
    --R:#f6b6d1;--R-glow:rgba(246,182,209,.5);
    --M:#ffb13d;--M-glow:rgba(255,177,61,.6);
    --you:#eba9c8;--you-glow:rgba(235,169,200,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%;background:var(--bg-grad);color:var(--text);
    font-family:'Nunito',sans-serif;overflow:hidden;
    overscroll-behavior:none;-webkit-font-smoothing:antialiased}
  body{display:flex;flex-direction:column;height:100vh;height:100dvh}

  header{padding:12px 16px 11px;background:var(--surface);flex-shrink:0}
  .trow{display:flex;align-items:baseline;gap:10px;margin-bottom:11px}
  .title{font-family:'Nunito',sans-serif;font-weight:700;font-size:22px;line-height:1}
  .ttag{font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
  .badge{margin-left:auto;font-size:11px;letter-spacing:.12em;padding:7px 14px;border-radius:20px;
    border:1px solid var(--line2);color:var(--muted);cursor:pointer;background:transparent;font-weight:700}
  .badge.stereo{color:var(--you);border-color:rgba(235,169,200,.55);background:rgba(235,169,200,.08)}
  .badge.mono{color:var(--M);border-color:var(--M)}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .btn{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--line2);
    padding:13px 13px;border-radius:16px;font-family:inherit;font-size:12px;font-weight:700;
    letter-spacing:.05em;text-transform:uppercase;cursor:pointer;
    transition:background .15s,border-color .15s,color .15s;-webkit-appearance:none}
  .btn:active{background:rgba(255,255,255,.14)}
  .btn.primary{border-color:var(--you);color:var(--you)}
  .btn:disabled{opacity:.3;cursor:not-allowed}
  .file-label{cursor:pointer;display:inline-block}
  .file-label input{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden}
  /* 方位ラベル: 画面横位置=方位の対応を示す。5等分で並べるとBACK/LEFT/FRONT/RIGHT/BACKが
     ちょうどu=0/0.25/0.5/0.75/1(=az -180/-90/0/+90/+180°)と一致する。控えめな表示。 */
  .azlabels{margin-top:9px;display:flex;justify-content:space-between;
    font-size:9px;letter-spacing:.14em;color:var(--muted2);text-transform:uppercase;font-weight:700}

  /* 闇に浮かぶスクリーン: overflow:hiddenだと同一要素のbox-shadowも切り取られてしまうため、
     stageにわずかな余白を持たせたうえでdrop-shadow(親のoverflowに影響されない)で外側に淡く発光させる。 */
  #stage{flex:1;position:relative;overflow:hidden;touch-action:none;background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
    border:1px solid var(--line);
    user-select:none;-webkit-user-select:none;min-height:0;margin:10px;border-radius:24px;
    filter:drop-shadow(0 0 20px rgba(235,169,200,.16)) drop-shadow(0 0 46px rgba(87,79,116,.35))}
  #vid{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
  #overlay{position:absolute;inset:0;pointer-events:none}
  .cross{position:absolute;background:rgba(255,255,255,.11)}
  .cross.h{left:0;right:0;top:50%;height:1px}
  .cross.v{top:0;bottom:0;left:50%;width:1px}
  .dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;opacity:0}
  .dot.on{opacity:1}
  .dot span{font-size:11px;font-weight:800;color:#06070b;font-family:'Nunito',sans-serif}
  .dot.L span{color:#1f3b34} .dot.R span{color:#5a2740}
  .dot.M{width:22px;height:22px;background:var(--M);box-shadow:0 0 0 6px rgba(255,177,61,.13),0 0 18px 2px var(--M-glow)}
  .dot.L{width:26px;height:26px;background:var(--L);box-shadow:0 0 0 8px rgba(159,227,207,.13),0 0 22px 2px var(--L-glow)}
  .dot.R{width:26px;height:26px;background:var(--R);box-shadow:0 0 0 8px rgba(246,182,209,.13),0 0 22px 2px var(--R-glow)}
  .dot.pulse::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:1.5px solid #fff;animation:pulse 1.8s ease-out infinite}
  .dot.M.pulse::after{border-color:var(--M)} .dot.L.pulse::after{border-color:var(--L)} .dot.R.pulse::after{border-color:var(--R)}
  @keyframes pulse{0%{transform:scale(.7);opacity:.8}100%{transform:scale(2.2);opacity:0}}
  /* 背後(|az|>90°)にあるドット: 色(L/Rの機能的な区別)は保ったまま、破線の輪郭で「背後」と分かるようにする */
  .dot.behind{outline:1.5px dashed rgba(255,255,255,.75);outline-offset:2px}

  /* オービット中、ドットが背後(画面外)にある間の気配グロー */
  .edgeglow{position:absolute;top:0;bottom:0;width:28%;pointer-events:none;opacity:0}
  .edgeglow.left{left:0;background:linear-gradient(to right,rgba(235,169,200,.6),rgba(235,169,200,0))}
  .edgeglow.right{right:0;background:linear-gradient(to left,rgba(235,169,200,.6),rgba(235,169,200,0))}

  .status{position:absolute;top:12px;left:12px;font-size:10px;color:var(--muted);letter-spacing:.14em;pointer-events:none;text-shadow:0 1px 4px #000}
  .status .dot2{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);margin-right:7px;vertical-align:middle}
  .status.playing .dot2{background:var(--R);box-shadow:0 0 10px var(--R-glow);animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .readout{position:absolute;top:12px;right:12px;font-size:10px;color:var(--muted);
    letter-spacing:.06em;text-align:right;line-height:1.8;pointer-events:none;
    font-variant-numeric:tabular-nums;text-shadow:0 1px 4px #000;
    opacity:0;transition:opacity .2s}
  .readout.on{opacity:1}
  .readout b{color:var(--text);font-weight:500}
  .hint{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);color:var(--text);
    font-size:11px;text-align:center;pointer-events:none;letter-spacing:.03em;line-height:1.7;
    width:88%;max-width:330px;transition:opacity .4s;text-shadow:0 1px 6px rgba(0,0,0,.4)}
  .hint .em{font-family:'Nunito',sans-serif;font-weight:700;color:#fff;font-size:17px;display:block;margin-bottom:6px;letter-spacing:0}

  /* on-screen debug log */
  #dbg{position:absolute;left:8px;bottom:8px;right:8px;max-height:34%;overflow:auto;
    background:rgba(0,0,0,.72);border:1px solid var(--line2);border-radius:10px;
    font-size:9.5px;line-height:1.5;color:#9fe7c0;padding:6px 8px;display:none;
    white-space:pre-wrap;word-break:break-word;z-index:50}
  #dbg.on{display:block}
  .dbgbtn{position:absolute;top:12px;right:120px;font-size:10px;color:var(--muted);
    border:1px solid var(--line2);border-radius:11px;padding:5px 11px;background:transparent;cursor:pointer}

  .deck{flex-shrink:0;background:var(--panel);
    padding:11px 14px 14px;display:flex;flex-direction:column;gap:11px}
  /* Distanceフェーダーは非表示(距離操作は2本指ピンチに一本化)。要素自体はJS(値の反映・塗りつぶし更新)が
     引き続き参照するためDOMには残し、表示のみ消す。 */
  .faders{display:none}
  .fader{display:flex;align-items:center;gap:12px}
  .fader .lab{font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;width:62px;flex-shrink:0;font-weight:700}
  .fader .val{font-size:12px;color:rgba(243,238,248,.85);letter-spacing:.02em;width:54px;text-align:right;flex-shrink:0;font-weight:700}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:4px;background:var(--line2);border-radius:4px;outline:none}
  input[type=range]:disabled{opacity:.3}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:radial-gradient(circle at 38% 30%,#3a3358,#1b1728 72%);
    box-shadow:0 0 0 4px rgba(235,169,200,.2),0 2px 6px rgba(0,0,0,.4);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;
    background:radial-gradient(circle at 38% 30%,#3a3358,#1b1728 72%);
    box-shadow:0 0 0 4px rgba(235,169,200,.2),0 2px 6px rgba(0,0,0,.4)}

  /* 下段: 俯瞰図(左カード) + 回転ノブ(右カード)を横並びに */
  .bottom{display:flex;gap:12px;align-items:stretch}
  .card{border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
  .card--map{flex:0 0 120px;padding:8px 8px 4px;display:flex;align-items:center}
  .card--map svg{display:block;width:100%}
  .card--knobs{flex:1;padding:10px 6px;display:flex;justify-content:space-around;align-items:center}

  .rot{display:flex;justify-content:space-around;align-items:center;gap:6px;width:100%}
  .rot.dim{opacity:.32;pointer-events:none}
  .rotlab{font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;text-align:center;margin-top:7px;font-weight:700}
  .knobwrap{display:flex;flex-direction:column;align-items:center}
  .knob{width:50px;height:50px;border-radius:50%;position:relative;cursor:ns-resize;
    background:radial-gradient(circle at 38% 32%,#3a3358,#1b1728 72%);
    border:1px solid var(--line2);box-shadow:inset 0 2px 5px rgba(255,255,255,.10),inset 0 -3px 6px rgba(0,0,0,.5),0 6px 14px rgba(0,0,0,.42);
    touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .knob::before{content:'';position:absolute;inset:-4px;border-radius:50%;z-index:-1;pointer-events:none;
    background:conic-gradient(from 220deg,var(--you) 0deg 258deg,rgba(255,255,255,.07) 258deg 360deg)}
  .knob.grab{border-color:var(--you)}
  .knob *{pointer-events:none}
  .knob .ind{position:absolute;left:50%;top:5px;width:2px;height:14px;background:var(--you);
    border-radius:2px;transform-origin:50% 20px;transform:translateX(-50%) rotate(0deg);box-shadow:0 0 6px var(--you-glow)}
  .knob .kv{display:none}
</style>
</head>
<body>
<header>
  <div class="trow">
    <div class="title">Spatial Tap</div>
    <div class="ttag">聴空間 · video</div>
    <button class="badge stereo" id="badge">STEREO</button>
  </div>
  <div class="controls">
    <label class="btn file-label">Load Video<input type="file" id="file" accept="video/*,.mov,.mp4,.m4v"></label>
    <button class="btn primary" id="play" disabled>▶ Play</button>
    <button class="btn" id="reset">Center</button>
    <button class="btn" id="modeBtn">JUMP</button>
  </div>
  <div class="azlabels"><span>BACK</span><span>LEFT</span><span>FRONT</span><span>RIGHT</span><span>BACK</span></div>
</header>

<div id="stage">
  <video id="vid" playsinline webkit-playsinline muted preload="metadata"></video>
  <div id="overlay">
    <div class="cross h"></div><div class="cross v"></div>
    <div class="dot M" id="dotM"></div>
    <div class="dot L" id="dotL"><span>L</span></div>
    <div class="dot R" id="dotR"><span>R</span></div>
    <div class="edgeglow left" id="edgeL"></div>
    <div class="edgeglow right" id="edgeR"></div>
  </div>
  <div class="status" id="status"><span class="dot2"></span>IDLE</div>
  <button class="dbgbtn" id="dbgbtn">LOG</button>
  <div class="readout" id="readout">azimuth <b>0°</b><br>elevation <b>0°</b><br>distance <b>3.0</b></div>
  <div class="hint" id="hint"><span class="em">Tap on the video</span>音が鳴ってほしい場所をタップ／ドラッグ</div>
  <div id="dbg"></div>
</div>

<div class="deck">
  <div class="faders">
    <div class="fader"><span class="lab">Distance</span>
      <input type="range" id="fDist" min="0" max="1000" step="1" value="365"><span class="val" id="vDist">36%</span></div>
  </div>
  <div class="bottom">
    <!-- 俯瞰図: 土星の輪くらいの傾きで、中央のリスナーを囲んで前後左右に空間が広がる。
         点(L/R/M)は既存のcenter()/rotOffset()の座標からリアルタイムに計算して描画する（updateOverheadMap()）。
         今回は前方のみ対応。背後(人型の手前側)の空間はまだ操作が来ないが、絵としては用意してある。 -->
    <div class="card card--map">
      <svg viewBox="0 0 120 96">
        <ellipse cx="60" cy="50" rx="52" ry="22" fill="rgba(255,255,255,.04)" stroke="rgba(243,238,248,.22)" stroke-width="1"/>
        <ellipse cx="60" cy="50" rx="28" ry="12" fill="none" stroke="rgba(243,238,248,.12)" stroke-width="1"/>
        <ellipse cx="60" cy="50" rx="7.5" ry="2.4" fill="rgba(0,0,0,.28)"/>
        <circle cx="60" cy="39" r="3.3" fill="rgba(243,238,248,.62)"/>
        <path d="M54,50 C54,40 56.5,38 60,38 C63.5,38 66,40 66,50 Z" fill="rgba(243,238,248,.5)"/>
        <g id="mapGroupM">
          <ellipse id="mapShadowM" rx="5.5" ry="1.8" fill="rgba(0,0,0,.28)"/>
          <line id="mapStemM" stroke="rgba(255,177,61,.6)" stroke-width="1.4" stroke-dasharray="1.5 2.5"/>
          <circle id="mapGlowM" r="6" fill="rgba(255,177,61,.2)"/>
          <circle id="mapDotM" r="3.8" fill="#ffb13d"/>
        </g>
        <g id="mapGroupL">
          <ellipse id="mapShadowL" rx="6" ry="2" fill="rgba(0,0,0,.28)"/>
          <line id="mapStemL" stroke="rgba(159,227,207,.6)" stroke-width="1.4" stroke-dasharray="1.5 2.5"/>
          <circle id="mapGlowL" r="6.5" fill="rgba(159,227,207,.2)"/>
          <circle id="mapDotL" r="4" fill="#9fe3cf"/>
        </g>
        <g id="mapGroupR">
          <ellipse id="mapShadowR" rx="5.5" ry="1.8" fill="rgba(0,0,0,.28)"/>
          <line id="mapStemR" stroke="rgba(246,182,209,.6)" stroke-width="1.4" stroke-dasharray="1.5 2.5"/>
          <circle id="mapGlowR" r="6" fill="rgba(246,182,209,.2)"/>
          <circle id="mapDotR" r="3.8" fill="#f6b6d1"/>
        </g>
      </svg>
    </div>
    <div class="card card--knobs">
      <div class="rot" id="rotPanel">
        <div class="knobwrap"><div class="knob" id="kYaw"><div class="ind"></div><div class="kv">0</div></div><div class="rotlab">yaw</div></div>
        <div class="knobwrap"><div class="knob" id="kPitch"><div class="ind"></div><div class="kv">0</div></div><div class="rotlab">pitch</div></div>
        <div class="knobwrap"><div class="knob" id="kRoll"><div class="ind"></div><div class="kv">0</div></div><div class="rotlab">roll</div></div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  // ---------- on-screen logger ----------
  const dbgEl=document.getElementById('dbg');
  const log=(...a)=>{const s=a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' ');
    dbgEl.textContent=('['+new Date().toLocaleTimeString()+'] '+s+'\n')+dbgEl.textContent;};
  window.addEventListener('error',e=>log('JS ERROR:',e.message,'@',e.lineno));
  // LOGボタンで数値readout(azimuth/elevation/distance)も一緒に開閉する。
  // 一般利用時は非表示がデフォルトで、詳しく知りたい人だけLOGを開けば見える。
  document.getElementById('dbgbtn').addEventListener('click',()=>{
    dbgEl.classList.toggle('on');
    document.getElementById('readout').classList.toggle('on');
  });
  log('init ok. tap LOG to hide.');

  const ctrl={u:0.5,v:0.5,dist:3,yaw:0,pitch:0,roll:0,stereo:true};
  let placed=true, playing=false; // 起動直後から初期位置(中央)にドットを表示する

  const AC=window.AudioContext||window.webkitAudioContext;
  let ctx=null, pM=null,pL=null,pR=null, dry=null,conv=null,wet=null,send=null,limiter=null,distComp=null,flyGain=null,lpFilter=null, splitter=null;
  let dbBack1k=null,dbBack12k=null,dbFront45=null,dbElev8k=null; // 方向バンド(directional bands)用のpeakingフィルタ
  let audioBuffer=null, srcNode=null, activeNode=null;
  let mediaSrc=null, mediaReady=false, useElementAudio=false;

  // Distanceスライダー: 0-1000のポジション値を指数変換して距離(m)にする対数カーブ。近距離ほど細かく調整できる。
  const DIST_MIN=0.4, DIST_MAX=100, DIST_POS_MAX=1000;
  const distFromPos=pos=>DIST_MIN*Math.pow(DIST_MAX/DIST_MIN,pos/DIST_POS_MAX);
  const posFromDist=d=>DIST_POS_MAX*Math.log(d/DIST_MIN)/Math.log(DIST_MAX/DIST_MIN);
  // 表示は「m」ではなく0-100%（内部の距離計算・音響/視覚への影響は変更しない、表示のみ）。
  // 誇張された演出値であり物理的に正確な距離ではないため、単位付き数値による誤解を避ける（HANDOFF 2章）。
  const distPercentText=d=>Math.round(posFromDist(d)/DIST_POS_MAX*100)+'%';
  // Distanceスライダーのつまみ左側をピンクで塗りつぶす表示。距離計算・音響ロジックには関与せず、見た目の反映のみ。
  function updateDistFill(){
    const pct=Math.round(posFromDist(ctrl.dist)/DIST_POS_MAX*100);
    $('fDist').style.background=`linear-gradient(to right, var(--you) 0%, var(--you) ${pct}%, var(--line2) ${pct}%, var(--line2) 100%)`;
  }

  // 奥行き軸(depth): 音量・高域減衰・残響・幅を1本のカーブで駆動する（HANDOFF 2章「誇張された体験」）。
  // 0=最も近い(0.4m) 〜 1=最も遠い(100m)。距離の対数比率(raw)を、さらに前寄せカーブ(1-(1-raw)^N)で誇張し、
  // 近距離側の変化を大きく感じさせる。Nが大きいほど誇張が強い＝実機で聴いて調整する前提の初期値。
  // （2026-07-10 実機フィードバックにより1.5→3へ引き上げ。近距離2割の範囲に変化の大半が起きる誇張を狙う）
  const DEPTH_EXAG_N=3;
  function depthOf(dist){
    const raw=Math.max(0,Math.min(1,Math.log(dist/DIST_MIN)/Math.log(DIST_MAX/DIST_MIN)));
    return 1-Math.pow(1-raw,DEPTH_EXAG_N);
  }
  const DEPTH_VOL_FLOOR=0.1;   // -20dB相当。100mでも聞こえなくはしない（既存のdistCompフロアと同じ値）
  const DEPTH_WIDTH_FAR=0.05;  // 最遠でもL/R幅を完全な1点にはしない
  const DEPTH_LPF_NEAR=20000;  // 近距離での高域カットオフ(実質バイパス)
  const DEPTH_LPF_FAR=1200;    // 最遠での高域カットオフ(こもるが不明瞭にはしない)
  const DEPTH_SEND_MIN=0.15, DEPTH_SEND_MAX=1.0;
  const widthScaleFromDepth=d=>1-d*(1-DEPTH_WIDTH_FAR);

  // 方向バンド(directional bands / Blauert 1960s): 特定周波数帯域が音源位置に関わらず特定方向として知覚される現象を
  // 意図的にブースト/カットして前後・上下の定位を誇張補強する(HANDOFF 2章)。dB量は控えめな初期値、実機で聴いて調整する前提。
  const DB_BACK_1K_HZ=1000,  DB_BACK_1K_DB=5;    // 最強の後方バンド。背後で+
  const DB_BACK_12K_HZ=12000,DB_BACK_12K_DB=4;   // 第2の後方バンド。背後で+
  const DB_FRONT_45_HZ=4500, DB_FRONT_45_DB=4;   // 前方バンド。背後ではこれを削って前方の印象を打ち消す(=カット)
  const DB_ELEV_8K_HZ=8000,  DB_ELEV_UP_DB=5, DB_ELEV_DOWN_DB=4; // 上方バンド。上で+、下で-(下方向は確立手法なしの逆アプローチ)
  // ドットの見た目(三段変化): 遠いほど小さく・ぼやけて・暗くし、音の奥行きと視覚を一致させる。
  // 音響用のdepthOf()はN=3で前寄せが強く、5m時点で既にdepthC≈0.84（ほぼ底値）に達してしまい、
  // タップの的として実用上よく使う5〜10m帯でドットがほぼ見えなくなる不具合があった（2026-07-10実機確認）。
  // 視覚だけはdepthVis=depthOf(dist)^VIS_POWでさらに前を緩め、近〜中距離の劣化を穏やかにする
  // （音響側のdepthOf()自体・DEPTH_EXAG_Nは変更しない＝今回は視覚カーブのみの調整）。
  const DOT_VIS_POW=4;
  const DOT_MIN_SCALE=0.65, DOT_MAX_BLUR=3, DOT_MIN_OPACITY=0.65;
  const DOT_BASE_PX={M:28,L:32,R:32};
  function dotVisualFromDepth(depthC){
    const depthVis=Math.pow(depthC,DOT_VIS_POW);
    return {scale:1-depthVis*(1-DOT_MIN_SCALE), blur:depthVis*DOT_MAX_BLUR, op:1-depthVis*(1-DOT_MIN_OPACITY)};
  }

  // フライバイ移動: タップ位置(ctrl.u/v =目標)へ、表示位置(dispU/dispV)が毎フレーム指数関数的に追従する。
  // 「誇張された体験」(HANDOFF 2章)の一環。ピッチは変えず、位置の弧＋わずかな音量ディップだけで「飛んでいく」感を出す。
  let dispU=0.5, dispV=0.5, flyLastT=null, flyDist=0;
  const FLY_TAU=0.11;   // 追従の時定数。約0.3秒でほぼ収束する
  const FLY_ARC=0.07;   // 弧の最大盛り上がり量（画面比率）
  const FLY_DIP=0.15;   // 飛行中の音量ディップ量（0-1、大きいほど飛行中に音が絞られる）
  function flyingPos(){
    const bump=Math.min(FLY_ARC,flyDist*0.6);
    return {u:dispU, v:Math.max(0,Math.min(1,dispV-bump))};
  }

  const $=id=>document.getElementById(id);
  const stage=$('stage'), vid=$('vid');
  const SCN=0.09;
  vid.muted=true; vid.loop=true; vid.playsInline=true; vid.setAttribute('playsinline','');
  $('fDist').value=Math.round(posFromDist(ctrl.dist));
  $('vDist').textContent=distPercentText(ctrl.dist);
  updateDistFill();

  function setStatus(t,on){$('status').className='status'+(on?' playing':'');$('status').innerHTML='<span class="dot2"></span>'+t;}

  function ensureCtx(){
    if(ctx) return;
    ctx=new AC();
    const mk=()=>{const p=ctx.createPanner();p.panningModel='HRTF';p.distanceModel='inverse';
      p.refDistance=1;p.maxDistance=DIST_MAX;p.rolloffFactor=1.0;return p;};
    pM=mk();pL=mk();pR=mk();
    limiter=ctx.createDynamicsCompressor();
    limiter.threshold.value=-9;limiter.knee.value=6;limiter.ratio.value=8;
    limiter.attack.value=0.005;limiter.release.value=0.2;
    limiter.connect(ctx.destination);
    // L/R panner が同じdryへ合流すると振幅が加算されるため、
    // コンプレッサーに入る前に-4dB程度のヘッドルームを確保する（電子ドラム等の速い立ち上がりでの瞬間クリップ対策）
    dry=ctx.createGain();dry.gain.value=0.6;dry.connect(limiter);
    send=ctx.createGain();send.gain.value=0.15;
    conv=ctx.createConvolver();wet=ctx.createGain();wet.gain.value=0.18;
    send.connect(conv);conv.connect(wet).connect(limiter);
    // distComp: PannerNode自身の距離減衰(1/d)を打ち消し、奥行き軸(depth)から決まる音量カーブに置き換える
    distComp=ctx.createGain();distComp.gain.value=1;
    // flyGain: フライバイ移動中だけ音量をわずかに絞り、ピッチを変えずに「動いている感」を出す
    flyGain=ctx.createGain();flyGain.gain.value=1;
    // lpFilter: 奥行きが増すほど高域を削り、近い/遠いの一貫した奥行き感を強化する
    lpFilter=ctx.createBiquadFilter();lpFilter.type='lowpass';lpFilter.Q.value=0.7;lpFilter.frequency.value=DEPTH_LPF_NEAR;
    // 方向バンド: pannerが合流した後の直列パスに4つのpeakingフィルタを挿入する。
    // ・L/Rの方位差は小さく方向バンドは単耳の分光手がかりなので、合流後に1系統でかける方がシンプルで安全
    //   (per-pannerだとフィルタ3倍・L/Rゲイン不一致のリスク。connectSourceのstereo/mono切替にも触れずに済む)。
    // ・limiterの手前に置くのでクリッピング保護は維持される。正面・水平では全バンド0dB=完全フラット(初期状態で音色不変)。
    const mkPeak=(hz,q)=>{const f=ctx.createBiquadFilter();f.type='peaking';f.frequency.value=hz;f.Q.value=q;f.gain.value=0;return f;};
    dbBack1k=mkPeak(DB_BACK_1K_HZ,2.0); dbBack12k=mkPeak(DB_BACK_12K_HZ,2.0);
    dbFront45=mkPeak(DB_FRONT_45_HZ,1.5); dbElev8k=mkPeak(DB_ELEV_8K_HZ,2.0);
    distComp.connect(flyGain);flyGain.connect(lpFilter);
    lpFilter.connect(dbBack1k);dbBack1k.connect(dbBack12k);dbBack12k.connect(dbFront45);dbFront45.connect(dbElev8k);
    dbElev8k.connect(dry);dbElev8k.connect(send);
    [pM,pL,pR].forEach(p=>{p.connect(distComp);});
    splitter=ctx.createChannelSplitter(2);
    const L=ctx.listener,t=ctx.currentTime;
    if(L.forwardX){L.forwardZ.setValueAtTime(-1,t);L.upY.setValueAtTime(1,t);}
    else if(L.setOrientation){L.setOrientation(0,0,-1,0,1,0);}
    makeIR();applyAudio(true);
    log('AudioContext created, state=',ctx.state);
  }
  function makeIR(){
    // Roomフェーダー廃止(2026-07-10): 空間サイズは固定値にした。距離による残響量の変化は
    // 既にdepth駆動のsend.gain(近距離=ほぼDry、遠距離=残響増)が担っており、Room相当の役割は不要になった。
    if(!ctx) return;
    const sec=1.0,sr=ctx.sampleRate;
    const len=Math.max(1,Math.floor(sr*sec)),ir=ctx.createBuffer(2,len,sr);
    for(let ch=0;ch<2;ch++){const d=ir.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);}
    try{conv.buffer=ir;}catch(e){}
  }
  function connectSource(node){
    if(!node) return;
    try{node.disconnect();}catch(e){}
    try{splitter.disconnect();}catch(e){}
    if(ctrl.stereo){node.connect(splitter);splitter.connect(pL,0);splitter.connect(pR,1);}
    else{node.connect(pM);}
    activeNode=node;
  }
  function rotOffset(widthMul=1){
    // widthMul: Widthフェーダーは廃止済み。常に100%を上限とし、奥行きによる自動収縮(音のみ)だけをwidthMulで表す
    // （呼び出し側で使い分け: updateDots()は1=見た目は常に最大幅のまま、applyAudio()はwidthScaleFromDepth()で音だけ狭める）
    const hw=widthMul*1.5;
    const ry=ctrl.yaw*Math.PI/180, rp=ctrl.pitch*Math.PI/180, rr=ctrl.roll*Math.PI/180;
    let x=hw,y=0,z=0;
    let x1=x*Math.cos(rr)-y*Math.sin(rr), y1=x*Math.sin(rr)+y*Math.cos(rr);
    let y2=y1*Math.cos(rp), z2=y1*Math.sin(rp), x2=x1;
    let x3=x2*Math.cos(ry)+z2*Math.sin(ry), z3=-x2*Math.sin(ry)+z2*Math.cos(ry), y3=y2;
    return {x:x3,y:y3,z:z3};
  }
  function center(){
    const p=flyingPos();
    // 画面横幅全体で方位一周(±180°)をカバーする(Audio Brewers ab Encoderの横軸=BACK-LEFT-FRONT-RIGHT-BACKと同じ構造)。
    // u=0(左端)=-180°、u=0.5(中央)=0°(正面)、u=1(右端)=+180°。左右端は同じ「真後ろ」。
    const az=(p.u-0.5)*2*Math.PI;
    const el=(0.5-p.v)*Math.PI*0.5, r=ctrl.dist, ce=Math.cos(el);
    return {x:r*ce*Math.sin(az), y:r*Math.sin(el), zf:r*ce*Math.cos(az), az, el};
  }
  function applyAudio(immediate){
    if(!ctx) return;
    const depthC=depthOf(ctrl.dist);
    const C=center(), o=rotOffset(widthScaleFromDepth(depthC)); // 音のみ幅を奥行きで狭める（見た目のrotOffset()は別呼び出しで従来通り）
    const setP=(p,x,y,zf)=>{if(!p)return;const t=ctx.currentTime,tc=immediate?0.001:0.05;
      if(p.positionX){p.positionX.setTargetAtTime(x,t,tc);p.positionY.setTargetAtTime(y,t,tc);p.positionZ.setTargetAtTime(-zf,t,tc);}
      else p.setPosition(x,y,-zf);};
    if(ctrl.stereo){setP(pL,C.x-o.x,C.y-o.y,C.zf-o.z);setP(pR,C.x+o.x,C.y+o.y,C.zf+o.z);}
    else{setP(pM,C.x,C.y,C.zf);}
    updateSend(immediate,depthC);
    updateDistComp(immediate,depthC);
    updateFlyGain(immediate);
    updateLowpass(immediate,depthC);
    updateDirBands(immediate,C.az,C.el);
  }
  // 方向バンド: 方位azと仰角elに連動して各peakingフィルタのゲインを動かす。全てsetTargetAtTimeで滑らかに追従。
  function updateDirBands(immediate,az,el){
    if(!dbBack1k) return;
    // backAmount: |az|が90°を超えて背後に回るほど0→1(真後ろ±180°で最大)。正面側(|az|<=90°)は0=フラット。
    const azN=((az+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI)-Math.PI;
    const backAmount=Math.max(0,Math.min(1,(Math.abs(azN)-Math.PI/2)/(Math.PI/2)));
    // elNorm: 仰角を±1に正規化(+1=真上, -1=真下)。上で8kHzブースト、下で8kHzカット。
    const elNorm=Math.max(-1,Math.min(1,el/(Math.PI/4)));
    const elev8k=elNorm>=0?DB_ELEV_UP_DB*elNorm:-DB_ELEV_DOWN_DB*(-elNorm);
    const t=ctx.currentTime,tc=immediate?0.001:0.06;
    dbBack1k.gain.setTargetAtTime(DB_BACK_1K_DB*backAmount,t,tc);
    dbBack12k.gain.setTargetAtTime(DB_BACK_12K_DB*backAmount,t,tc);
    dbFront45.gain.setTargetAtTime(-DB_FRONT_45_DB*backAmount,t,tc);
    dbElev8k.gain.setTargetAtTime(elev8k,t,tc);
  }
  function updateSend(immediate,depthC){
    if(!send) return;
    const amt=DEPTH_SEND_MIN+depthC*(DEPTH_SEND_MAX-DEPTH_SEND_MIN);
    const t=ctx.currentTime,tc=immediate?0.001:0.08;
    send.gain.setTargetAtTime(amt,t,tc);
  }
  function updateDistComp(immediate,depthC){
    if(!distComp) return;
    // PannerNode自身の距離減衰(1/d)を打ち消したうえで、奥行きカーブに基づく音量(vol)へ置き換える
    const natural=ctrl.dist<=1?1:1/ctrl.dist; // PannerNode(refDistance=1,rolloffFactor=1)の減衰と同じ式
    const vol=Math.pow(DEPTH_VOL_FLOOR,depthC); // depth=0で1(無変化)、depth=1でフロア値
    const comp=vol/natural;
    const t=ctx.currentTime,tc=immediate?0.001:0.08;
    distComp.gain.setTargetAtTime(comp,t,tc);
  }
  function updateLowpass(immediate,depthC){
    if(!lpFilter) return;
    const hz=DEPTH_LPF_NEAR*Math.pow(DEPTH_LPF_FAR/DEPTH_LPF_NEAR,depthC);
    const t=ctx.currentTime,tc=immediate?0.001:0.08;
    lpFilter.frequency.setTargetAtTime(hz,t,tc);
  }
  function updateFlyGain(immediate){
    if(!flyGain) return;
    const speedNorm=Math.min(1,flyDist/0.12); // 目標までの残り距離を正規化(0.12=典型的な1タップ分の目安)
    const g=1-FLY_DIP*speedNorm;
    const t=ctx.currentTime,tc=immediate?0.02:0.06;
    flyGain.gain.setTargetAtTime(g,t,tc);
  }
  // 気配グロー(画面端の発光): 方位が前方半球(|az|<=90°)かどうかで、ドット表示 or 端の発光に切り替える。
  // オービット(orbitStep)と自由配置の背後(updateDots)の両方から使う共通ロジック。
  function applyEdgeGlow(az){
    const azN=((az+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI)-Math.PI;
    const front=Math.abs(azN)<=Math.PI/2;
    if(front){ $('edgeL').style.opacity=0; $('edgeR').style.opacity=0; return true; }
    const intensity=Math.min(1,(Math.abs(azN)-Math.PI/2)/(Math.PI/2));
    if(azN>0){ $('edgeR').style.opacity=intensity; $('edgeL').style.opacity=0; }
    else{ $('edgeL').style.opacity=intensity; $('edgeR').style.opacity=0; }
    return false;
  }
  function updateDots(){
    const o=rotOffset(), clamp=n=>Math.max(0,Math.min(1,n));
    const p=flyingPos();
    // 画面横幅全体が方位一周に対応するため、背後(|az|>90°)も画面上にドットとして表示する
    // (色は保ったまま破線の輪郭+半透明にして「背後」と分かるようにする。気配グローはオービット専用に残す)。
    const az=center().az;
    const azN=((az+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI)-Math.PI;
    const isBehind=Math.abs(azN)>Math.PI/2;
    const M=$('dotM'),Ld=$('dotL'),Rd=$('dotR');
    M.classList.toggle('on',placed&&!ctrl.stereo);
    Ld.classList.toggle('on',placed&&ctrl.stereo);
    Rd.classList.toggle('on',placed&&ctrl.stereo);
    [M,Ld,Rd].forEach(d=>d.classList.toggle('pulse',playing&&d.classList.contains('on')));
    [M,Ld,Rd].forEach(d=>d.classList.toggle('behind',isBehind));
    // 三段変化: 奥行き(depth)が増すほど小さく・ぼやけて・暗くする。同じ距離を参照するため音との連動タイミングは変わらないが、
    // 視覚だけはdepthVis(=depthC^DOT_VIS_POW)で近〜中距離の劣化を緩め、5〜10m帯でも視認・タップできるようにしている。
    const dv=dotVisualFromDepth(depthOf(ctrl.dist));
    const behindOpMul=isBehind?0.5:1; // 背後はさらに半透明寄りにして視覚的に区別する
    [['M',M],['L',Ld],['R',Rd]].forEach(([key,el])=>{
      const px=DOT_BASE_PX[key]*dv.scale;
      el.style.width=px+'px'; el.style.height=px+'px';
      el.style.filter='blur('+dv.blur.toFixed(2)+'px)';
      el.style.opacity=el.classList.contains('on')?dv.op*behindOpMul:0;
    });
    if(ctrl.stereo){
      Ld.style.left=clamp(p.u-o.x*SCN)*100+'%'; Ld.style.top=clamp(p.v+o.y*SCN)*100+'%';
      Rd.style.left=clamp(p.u+o.x*SCN)*100+'%'; Rd.style.top=clamp(p.v-o.y*SCN)*100+'%';
    } else {M.style.left=p.u*100+'%'; M.style.top=p.v*100+'%';}
  }
  // 俯瞰図: 音源の位置(center()/rotOffset()と同じ座標)を土星の輪のようなタイル楕円へ投影して描画する。
  // 半径は既存のdepthOf(ctrl.dist)を流用(誇張カーブと一貫させる)。方位は±180°(背後)まで対応する。
  // 前方=奥(楕円の上側)、背後=手前(楕円の下側)。高さ(縦線)はel(仰角)を符号付きで反映し、上下どちらにも伸びる。
  const MAP_CX=60, MAP_CY=50, MAP_RX=48, MAP_RY=19;
  const MAP_STEM_MIN=4, MAP_STEM_MAX=26;
  function updateOverheadMap(){
    const depthC=depthOf(ctrl.dist);
    const C=center(), o=rotOffset();
    const elNorm=Math.max(-1,Math.min(1,C.el/(Math.PI/4)));
    const stemSign=elNorm===0?1:Math.sign(elNorm);
    const stemH=stemSign*(MAP_STEM_MIN+Math.abs(elNorm)*(MAP_STEM_MAX-MAP_STEM_MIN));
    function place(id,x,zf){
      const az=Math.atan2(x,zf); // -180..180、クランプなし(背後も正しく投影する)
      const sx=MAP_CX+depthC*MAP_RX*Math.sin(az), sy=MAP_CY-depthC*MAP_RY*Math.cos(az);
      $('mapShadow'+id).setAttribute('cx',sx); $('mapShadow'+id).setAttribute('cy',sy);
      $('mapStem'+id).setAttribute('x1',sx); $('mapStem'+id).setAttribute('y1',sy);
      $('mapStem'+id).setAttribute('x2',sx); $('mapStem'+id).setAttribute('y2',sy-stemH);
      $('mapGlow'+id).setAttribute('cx',sx); $('mapGlow'+id).setAttribute('cy',sy-stemH);
      $('mapDot'+id).setAttribute('cx',sx); $('mapDot'+id).setAttribute('cy',sy-stemH);
    }
    const showM=placed&&!ctrl.stereo, showLR=placed&&ctrl.stereo;
    $('mapGroupM').style.display=showM?'':'none';
    $('mapGroupL').style.display=showLR?'':'none';
    $('mapGroupR').style.display=showLR?'':'none';
    if(showM) place('M',C.x,C.zf);
    if(showLR){ place('L',C.x-o.x,C.zf-o.z); place('R',C.x+o.x,C.zf+o.z); }
  }
  function refresh(){
    if(orbit) return; // オービット中は専用の描画(orbitStep)に任せる。通常経路とは競合させない。
    updateDots(); applyAudio(false); updateOverheadMap();
    const C=center();
    $('readout').innerHTML=`azimuth <b>${Math.round(C.az*180/Math.PI)}°</b><br>`+
      `elevation <b>${Math.round(C.el*180/Math.PI)}°</b><br>distance <b>${ctrl.dist.toFixed(1)}</b>`;
  }

  // ---------- オービット(背後周回演出): ドットのダブルタップで、固定円軌道を1周する（HANDOFF 2章） ----------
  // 通常のu/v(±90°の前方半球)とは別枠で方位を直接扱い、背後(±180°まで)を確実に通過させる。
  // 距離はctrl.distから独立した固定値にし、周回中の音量・残響・幅・高域減衰を一定に保つ。
  let orbit=null; // {az0, el0, v0, startTime}
  const ORBIT_DUR=2500;  // ms。1周の所要時間(誇張路線で速め。実機調整前提)
  const ORBIT_DIST=1.5;  // m相当の固定距離。ctrl.distに関わらず一定（近すぎず・遠すぎず・明瞭さ優先。実機調整前提）
  function startOrbit(){
    if(orbit||!placed) return;
    const az0=(ctrl.u-0.5)*Math.PI, el0=(0.5-ctrl.v)*Math.PI*0.5;
    orbit={az0,el0,v0:ctrl.v,startTime:performance.now()};
    $('hint').style.opacity='0';
    log('orbit start az0=',Math.round(az0*180/Math.PI)+'°');
  }
  function endOrbit(){
    orbit=null;
    $('edgeL').style.opacity=0; $('edgeR').style.opacity=0;
    log('orbit end');
    refresh();
  }
  function orbitStep(now){
    const t=(now-orbit.startTime)/ORBIT_DUR;
    if(t>=1){ endOrbit(); return; }
    const az=orbit.az0+t*Math.PI*2, el=orbit.el0;
    const r=ORBIT_DIST, ce=Math.cos(el);
    const C={x:r*ce*Math.sin(az), y:r*Math.sin(el), zf:r*ce*Math.cos(az)};
    const depthC=depthOf(ORBIT_DIST); // 固定距離なので周回中ずっと一定
    const o=rotOffset(widthScaleFromDepth(depthC));
    const setP=(p,x,y,zf)=>{if(!p)return;const tt=ctx.currentTime;
      if(p.positionX){p.positionX.setTargetAtTime(x,tt,0.02);p.positionY.setTargetAtTime(y,tt,0.02);p.positionZ.setTargetAtTime(-zf,tt,0.02);}
      else p.setPosition(x,y,-zf);};
    if(ctrl.stereo){setP(pL,C.x-o.x,C.y-o.y,C.zf-o.z);setP(pR,C.x+o.x,C.y+o.y,C.zf+o.z);}
    else{setP(pM,C.x,C.y,C.zf);}
    updateSend(false,depthC); updateDistComp(false,depthC); updateLowpass(false,depthC);
    updateDirBands(false,az,el); // オービット周回中も方向バンドを追従させる(背後で「後ろから」を強化)
    // 前方半球(|az|<=90°)ならドット、それ以外は背後=画面端グロー(applyEdgeGlowで共通判定)。
    const front=applyEdgeGlow(az);
    const M=$('dotM'),Ld=$('dotL'),Rd=$('dotR');
    if(front){
      const azN=((az+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI)-Math.PI;
      const u=azN/Math.PI+0.5, v=orbit.v0;
      const dv=dotVisualFromDepth(depthC), clamp=n=>Math.max(0,Math.min(1,n));
      [['M',M],['L',Ld],['R',Rd]].forEach(([key,el2])=>{
        const px=DOT_BASE_PX[key]*dv.scale;
        el2.style.width=px+'px'; el2.style.height=px+'px';
        el2.style.filter='blur('+dv.blur.toFixed(2)+'px)';
      });
      M.classList.toggle('on',!ctrl.stereo); Ld.classList.toggle('on',ctrl.stereo); Rd.classList.toggle('on',ctrl.stereo);
      [M,Ld,Rd].forEach(d=>d.classList.toggle('pulse',playing&&d.classList.contains('on')));
      if(ctrl.stereo){
        Ld.style.opacity=dv.op; Rd.style.opacity=dv.op; M.style.opacity=0;
        Ld.style.left=clamp(u-o.x*SCN)*100+'%'; Ld.style.top=clamp(v+o.y*SCN)*100+'%';
        Rd.style.left=clamp(u+o.x*SCN)*100+'%'; Rd.style.top=clamp(v-o.y*SCN)*100+'%';
      } else {
        M.style.opacity=dv.op; Ld.style.opacity=0; Rd.style.opacity=0;
        M.style.left=u*100+'%'; M.style.top=v*100+'%';
      }
    } else {
      M.style.opacity=0; Ld.style.opacity=0; Rd.style.opacity=0;
    }
  }

  // ---------- フライバイ移動: dispU/dispV を毎フレーム目標(ctrl.u/v)へ指数関数的に追従させる ----------
  function flyStep(ts){
    if(orbit){ orbitStep(ts); requestAnimationFrame(flyStep); return; }
    if(flyLastT==null) flyLastT=ts;
    const dt=Math.min(0.05,(ts-flyLastT)/1000); flyLastT=ts;
    const k=1-Math.exp(-dt/FLY_TAU);
    // uは円環(0-1がラップアラウンドして繋がる)なので、素直な差ではなく最短経路の差分を使う。
    // そうしないと端をまたいだ瞬間に「長い方(ほぼ1周)」を飛んでしまう。
    let du=ctrl.u-dispU; du-=Math.round(du);
    const dv=ctrl.v-dispV;
    dispU+=du*k; dispU=((dispU%1)+1)%1; dispV+=dv*k;
    flyDist=Math.hypot(du,dv);
    refresh();
    requestAnimationFrame(flyStep);
  }
  requestAnimationFrame(flyStep);

  // ドット移動モード: JUMP=タップした場所へ絶対位置で瞬間移動(既存挙動)。DRAG=指の移動量だけ相対的に動く。
  // DSpatial Reality VRのEdit Mode(Absolute/Relative)と同じ発想。ピンチ(距離)・背後配置(下端引き)は両モード共通。
  let dragMode='jump';
  function setDragMode(m){
    dragMode=m;
    $('modeBtn').textContent=m.toUpperCase();
    $('modeBtn').classList.toggle('primary',m==='drag');
  }
  $('modeBtn').addEventListener('click',()=>setDragMode(dragMode==='jump'?'drag':'jump'));
  setDragMode('jump'); // let dragMode宣言後に呼ぶ(宣言前に呼ぶとTDZでReferenceErrorになり全体が止まる)

  // ---------- stage pointer (1本指=位置、2本指=位置(重心)+距離(間隔)を同時操作) ----------
  // ルールはシンプルに統一: 触れている指の重心が常にXY位置を、2本指のときはさらに指の間隔がDistanceを駆動する。
  const pinchPointers=new Map(); // pointerId -> {x,y}
  let posOffU=0, posOffV=0;         // 指の本数が変わる瞬間の位置ジャンプを防ぐための補正オフセット
  let distStartFingerDist=0, distStartPos=0; // 2本指の間隔→Distanceは開始時点からの相対変化で駆動
  // PINCH_SENS: 指の開閉1pxあたりのDistanceポジション変化量(0-1000スケール)。
  // 対数距離レンジ全体(0.4-100m)を1回の大きなピンチ(指の開閉幅 約330px)でほぼ走破できる値として3を初期値にした
  // （開閉30pxで3m付近から約1.8-4.9mへ、100pxで約0.6-16mへ変化する検算に基づく。実機の操作感で調整前提）。
  const PINCH_SENS=3;
  function trackedCentroid(){
    const pts=[...pinchPointers.values()];
    if(!pts.length) return null;
    let sx=0,sy=0; pts.forEach(p=>{sx+=p.x;sy+=p.y;});
    return {x:sx/pts.length,y:sy/pts.length};
  }
  function applyTrackedPosition(){
    const c=trackedCentroid(); if(!c) return;
    const r=stage.getBoundingClientRect();
    const rawU=(c.x-r.left)/r.width+posOffU, rawV=(c.y-r.top)/r.height+posOffV;
    // 左右は円環: 端を超えたらラップアラウンドして反対側から出てくる(BACK-LEFT-FRONT-RIGHT-BACK構造)。
    ctrl.u=((rawU%1)+1)%1;
    // 上下は高さ(elevation)のみ。画面外に出ないようクランプする(旧・下端引きで背後へ回り込む操作は廃止)。
    ctrl.v=Math.max(0,Math.min(1,rawV));
    placed=true; $('hint').style.opacity='0';
  }
  // ドットのダブルタップ判定(オービット起動): タップ座標が現在表示中のドット付近かを見る。
  let lastDotTapTime=0;
  const DBLTAP_MS=350, DOT_HIT_PX=50;
  function isNearDot(cx,cy){
    const r=stage.getBoundingClientRect(), p=flyingPos(), clamp=n=>Math.max(0,Math.min(1,n));
    if(ctrl.stereo){
      const o=rotOffset();
      const lx=r.left+clamp(p.u-o.x*SCN)*r.width, ly=r.top+clamp(p.v+o.y*SCN)*r.height;
      const rx=r.left+clamp(p.u+o.x*SCN)*r.width, ry=r.top+clamp(p.v-o.y*SCN)*r.height;
      return Math.hypot(cx-lx,cy-ly)<DOT_HIT_PX||Math.hypot(cx-rx,cy-ry)<DOT_HIT_PX;
    }
    const mx=r.left+p.u*r.width, my=r.top+p.v*r.height;
    return Math.hypot(cx-mx,cy-my)<DOT_HIT_PX;
  }
  stage.addEventListener('pointerdown',e=>{
    ensureCtx();if(ctx&&ctx.state==='suspended')ctx.resume();
    if(orbit) return; // オービット中はタップ/ピンチによる割り込みを受け付けない
    const wasEmpty=pinchPointers.size===0;
    if(wasEmpty&&placed&&isNearDot(e.clientX,e.clientY)){
      const now=performance.now();
      if(now-lastDotTapTime<DBLTAP_MS){ lastDotTapTime=0; startOrbit(); return; }
      lastDotTapTime=now;
    }
    try{stage.setPointerCapture(e.pointerId);}catch(_){}
    pinchPointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    const r=stage.getBoundingClientRect(), c=trackedCentroid();
    if(wasEmpty&&dragMode==='jump'){
      // JUMP: 完全に新しいタップはオフセットなし(絶対位置)。「タップ=その場に瞬間移動」。
      posOffU=0; posOffV=0;
    } else {
      // DRAG: 新規タップでも現在位置を保つオフセットにする(=指が動いた分だけ相対的に動く)。
      // 指の本数が変わった(1→2など)場合も同じ式でジャンプを防ぐ(JUMPモードと共通)。
      posOffU=ctrl.u-(c.x-r.left)/r.width;
      posOffV=ctrl.v-(c.y-r.top)/r.height;
    }
    if(pinchPointers.size===2){
      const pts=[...pinchPointers.values()];
      distStartFingerDist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
      distStartPos=posFromDist(ctrl.dist);
    }
    if(pinchPointers.size<=2) applyTrackedPosition();
    refresh();
  });
  stage.addEventListener('pointermove',e=>{
    if(orbit) return;
    if(!pinchPointers.has(e.pointerId)) return;
    pinchPointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pinchPointers.size>2) return; // 3本目以降は位置・距離どちらも更新しない
    applyTrackedPosition();
    if(pinchPointers.size===2){
      const pts=[...pinchPointers.values()];
      const curFingerDist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
      const newPos=Math.max(0,Math.min(DIST_POS_MAX,distStartPos+PINCH_SENS*(curFingerDist-distStartFingerDist)));
      ctrl.dist=distFromPos(newPos);
      $('fDist').value=Math.round(newPos); $('vDist').textContent=distPercentText(ctrl.dist); updateDistFill();
    }
    refresh();
  });
  const stagePointerEnd=e=>{
    pinchPointers.delete(e.pointerId);
    if(pinchPointers.size>0){
      // 指の本数が変わった(2→1など): 現在のctrl.u/vを保ったままオフセットを再計算し、位置がジャンプしないようにする。
      const c=trackedCentroid(), r=stage.getBoundingClientRect();
      posOffU=ctrl.u-(c.x-r.left)/r.width;
      posOffV=ctrl.v-(c.y-r.top)/r.height;
    }
  };
  stage.addEventListener('pointerup',stagePointerEnd);
  stage.addEventListener('pointercancel',stagePointerEnd);
  // iOS Safari系の独自ジェスチャーイベント(touch-action:noneだけでは稀に防ぎきれない場合の保険)
  ['gesturestart','gesturechange','gestureend'].forEach(t=>stage.addEventListener(t,e=>e.preventDefault()));

  // ---------- faders ----------
  $('fDist').addEventListener('input',e=>{ctrl.dist=distFromPos(parseFloat(e.target.value));$('vDist').textContent=distPercentText(ctrl.dist);updateDistFill();refresh();});

  // ---------- rotation knobs : robust pointer handling ----------
  function knob(el,key){
    const ind=el.querySelector('.ind'),kv=el.querySelector('.kv');
    function render(){ind.style.transform=`translateX(-50%) rotate(${ctrl[key]}deg)`;
      kv.textContent=(((Math.round(ctrl[key])%360)+360)%360);}
    let sy=0,sv=0,active=false,pid=null,lastTapT=0;
    // ダブルタップ/ダブルクリックで0にリセット。pointerdownでpreventDefault()しているため
    // click/dblclickの合成イベントがiOS等では発火しないことがあり、pointerdownの間隔で自前判定する。
    const DBLTAP_MS=350;
    el.addEventListener('pointerdown',e=>{
      e.preventDefault();e.stopPropagation();
      const now=performance.now();
      if(now-lastTapT<DBLTAP_MS){
        lastTapT=0;
        ctrl[key]=0; render(); refresh();
        log(key,'dbltap reset to 0');
        return; // ドラッグは開始しない
      }
      lastTapT=now;
      active=true;pid=e.pointerId;sy=e.clientY;sv=ctrl[key];el.classList.add('grab');
      try{el.setPointerCapture(e.pointerId);}catch(_){}
      log(key,'grab @',Math.round(e.clientY));
    });
    el.addEventListener('pointermove',e=>{
      if(!active||e.pointerId!==pid)return;
      e.preventDefault();e.stopPropagation();
      ctrl[key]=sv+(sy-e.clientY)*1.2; render(); refresh();
    });
    const end=e=>{if(!active)return;active=false;pid=null;el.classList.remove('grab');
      try{el.releasePointerCapture(e.pointerId);}catch(_){}log(key,'=',Math.round(ctrl[key]));};
    el.addEventListener('pointerup',end);
    el.addEventListener('pointercancel',end);
    el.addEventListener('lostpointercapture',()=>{active=false;el.classList.remove('grab');});
    render();
  }
  knob($('kYaw'),'yaw');knob($('kPitch'),'pitch');knob($('kRoll'),'roll');

  // ---------- mono/stereo ----------
  function setStereo(on){
    ctrl.stereo=on;
    $('badge').textContent=on?'STEREO':'MONO';
    $('badge').className='badge '+(on?'stereo':'mono');
    $('rotPanel').classList.toggle('dim',!on);
    if(activeNode) connectSource(activeNode);
    refresh();
  }
  $('badge').addEventListener('click',()=>setStereo(!ctrl.stereo));

  // ---------- file load ----------
  $('file').addEventListener('change',async e=>{
    log('change fired. files=',e.target.files?e.target.files.length:0);
    const f=e.target.files&&e.target.files[0]; if(!f){log('no file');return;}
    log('file:',f.name,'type=',f.type||'(empty)','size=',Math.round(f.size/1e6)+'MB');
    audioBuffer=null; useElementAudio=false;
    const url=URL.createObjectURL(f);
    vid.src=url; vid.muted=true; vid.load();
    $('play').disabled=false;
    vid.addEventListener('loadedmetadata',()=>log('video meta:',vid.videoWidth+'x'+vid.videoHeight),{once:true});
    vid.addEventListener('error',()=>{const er=vid.error;log('VIDEO ERROR code=',er?er.code:'?','(HEVC等は非対応の場合あり)');},{once:true});
    ensureCtx();
    try{
      const arr=await f.arrayBuffer();
      audioBuffer=await ctx.decodeAudioData(arr.slice(0));
      setStereo(audioBuffer.numberOfChannels>=2);
      log('audio decoded ch=',audioBuffer.numberOfChannels,'dur=',audioBuffer.duration.toFixed(1));
    }catch(err){
      useElementAudio=true;
      log('decodeAudioData failed:',err.message||err,'-> element audio fallback');
    }
  });

  // ---------- transport ----------
  $('play').addEventListener('click',()=>{
    if(!vid.src){log('play: no src');return;}
    ensureCtx();
    if(playing){
      vid.pause();try{srcNode&&srcNode.stop();}catch(_){}
      playing=false;$('play').textContent='▶ Play';setStatus('PAUSED',false);updateDots();log('paused');return;
    }
    const pv=vid.play();
    if(pv&&pv.then) pv.then(()=>log('video.play ok')).catch(er=>{log('video.play blocked:',er.message,'-> もう一度Playを押してください');});
    if(audioBuffer){
      srcNode=ctx.createBufferSource();srcNode.buffer=audioBuffer;srcNode.loop=true;
      connectSource(srcNode);
      const off=(vid.currentTime||0)%audioBuffer.duration;
      try{srcNode.start(0,off);}catch(_){try{srcNode.start(0);}catch(__){}}
      log('buffer audio started');
    } else if(useElementAudio){
      vid.muted=false;
      if(!mediaReady){try{mediaSrc=ctx.createMediaElementSource(vid);mediaReady=true;log('mediaElementSource ok');}catch(er){log('MES err:',er.message);}}
      if(mediaSrc) connectSource(mediaSrc);
    }
    if(ctx.state==='suspended') ctx.resume();
    playing=true;$('play').textContent='■ Stop';setStatus('PLAYING',true);
    $('hint').style.opacity='0';
    refresh();
  });
  $('reset').addEventListener('click',()=>{ctrl.u=0.5;ctrl.v=0.5;placed=true;$('hint').style.opacity='0';refresh();});
})();
</script>
</body>
</html>
